<!DOCTYPE html>
<html>
<head>
  <title>Defence Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Protect Dashboard -->
<script>
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
  }
</script>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>COMMAND</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>🚨 Alerts</li>
      <li>🚓 Patrol</li>
      <li>🎯 Missions</li>
      <li>📊 Analytics</li>
    </ul>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- Main -->
  <div class="main">
    <h1>🛡 Defence Dashboard</h1>

    <!-- Alerts -->
    <h2>🚨 Alerts</h2>
    <div class="cards">
      <div class="card red">Intrusion Detected - Zone A</div>
      <div class="card yellow">Drone Activity - Sector 5</div>
      <div class="card green">All Systems Normal</div>
    </div>

    <!-- Patrol -->
    <h2>🚓 Patrol Units</h2>
    <div class="cards">
      <div class="card">Unit Alpha - Active</div>
      <div class="card">Unit Bravo - On Patrol</div>
      <div class="card">Unit Charlie - Standby</div>
    </div>

    <!-- Simulation -->
    <h2>🎮 Simulation</h2>
    <button onclick="simulate()">Run Simulation</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
