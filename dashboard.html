<!DOCTYPE html>
<html lang="en">
<head>
  <title>Defence Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Protect Page (only logged in users) -->
<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "index.html";
  }
</script>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>COMMAND</h2>
    <ul>
      <li>🏠 Dashboard</li>
      <li>🎯 Missions</li>
      <li>📊 Analytics</li>
      <li>🛰 Surveillance</li>
    </ul>

    <!-- Logout Button -->
    <button onclick="logout()" style="margin-top:20px;">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1>🛡 Defence Dashboard</h1>

    <div class="cards">
      <div class="card red">🚨 Intrusion Detected</div>
      <div class="card yellow">🛰 Drone Detected</div>
      <div class="card green">✅ All Systems Normal</div>
    </div>

    <button onclick="simulate()">▶ Run Simulation</button>
  </div>

</div>

<script src="script.js"></script>
</body>
